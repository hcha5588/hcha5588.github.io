<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK Assistant Dashboard</title>
    <style>
        /* This styles your screen to look like a clean, minimal smart display */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .widget {
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            min-width: 280px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        h1 { margin: 0 0 10px 0; font-size: 1.5rem; color: #aaa; }
        .temp { font-size: 3.5rem; font-weight: bold; color: #00ffcc; margin: 10px 0; }
        .update-time { font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>

    <div class="widget">
        <h1>HK WEATHER</h1>
        <div id="temperature" class="temp">Loading...</div>
        <div id="time" class="update-time">Connecting to HKO...</div>
    </div>

    <script>
        // This is the functional "brain" that grabs the HK Data
        async function fetchWeather() {
            try {
                // We ask the HK Observatory for real-time weather data
                const response = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=en');
                const data = await response.json();
                
                // We extract just the King's Park temperature from the database
                const currentTemp = data.temperature.data[0].value;
                
                // We inject that temperature into our HTML placeholder above
                document.getElementById('temperature').innerText = currentTemp + "°C";
                document.getElementById('time').innerText = "Last update: " + new Date().toLocaleTimeString();
            } catch (error) {
                document.getElementById('temperature').innerText = "Error";
                console.error("Failed to load HK Data:", error);
            }
        }

        // Run the function immediately when the webpage opens
        fetchWeather();
        
        // Refresh the weather data automatically every 5 minutes (300,000 milliseconds)
        setInterval(fetchWeather, 300000);
    </script>
</body>
</html>
