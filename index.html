<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK Personal Dashboard</title>
    <style>
        :root {
            --bg-color: #121316;
            --card-bg: #1c1d22;
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
            --accent-warm: #e5a93b;
            --border-subtle: #2a2c35;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        #warning-banner {
            display: none;
            background-color: #2c1a1d;
            color: #ff8b94;
            border: 1px solid #5c262a;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 500;
            margin-bottom: 24px;
            width: 100%;
            max-width: 760px;
            text-align: center;
            box-sizing: border-box;
            font-size: 0.95rem;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 760px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 28px;
            border: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 220px;
        }

        .card-header {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        .weather-main {
            display: flex;
            align-items: baseline;
            margin: 10px 0;
        }

        .temp-large {
            font-size: 4.5rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1;
        }

        .temp-unit {
            font-size: 1.8rem;
            color: var(--text-dim);
            font-weight: 400;
            margin-left: 4px;
        }

        .weather-range {
            display: flex;
            gap: 24px;
            font-size: 0.95rem;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border-subtle);
        }

        .range-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .range-label {
            color: var(--text-dim);
        }

        .bus-meta {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 4px;
        }

        .bus-route {
            font-size: 3.2rem;
            font-weight: 800;
            color: var(--text-main);
            margin: 0;
        }

        .bus-dest {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin: 0 0 20px 0;
        }

        .eta-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .eta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #23252c;
            padding: 14px 18px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .eta-label {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .eta-time {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .eta-mins {
            font-size: 0.9rem;
            color: var(--text-dim);
            font-weight: 500;
            margin-left: 2px;
        }

        .footer-info {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="warning-banner"></div>

    <div class="container">
        
        <!-- WEATHER CARD -->
        <div class="card">
            <div>
                <div class="card-header">Weather</div>
                <div class="weather-main">
                    <span id="current-temp" class="temp-large">--</span>
                    <span class="temp-unit">°C</span>
                </div>
            </div>
            <div class="weather-range">
                <div class="range-item">
                    <span class="range-label">Low:</span>
                    <span id="min-temp" style="color: var(--text-main);">--°C</span>
                </div>
                <div class="range-item">
                    <span class="range-label">High:</span>
                    <span id="max-temp" style="color: var(--accent-warm);">--°C</span>
                </div>
            </div>
        </div>

        <!-- KMB BUS CARD -->
        <div class="card">
            <div>
                <div class="card-header">Transit</div>
                <div class="bus-meta">
                    <h2 class="bus-route">215X</h2>
                </div>
                <div class="bus-dest">Lam Tin bound • Kowloon Station Dep.</div>
                
                <div class="eta-list" id="bus-eta-container">
                    <div class="eta-row"><span style="color: var(--text-dim)">Checking live trackers...</span></div>
                </div>
            </div>
        </div>

        <div class="footer-info" id="update-stamp">Connecting...</div>
    </div>

    <script>
        const HKO_WEATHER_URL = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=en';
        const HKO_WARNING_URL = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=en';
        const KMB_ETA_URL = 'https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/0840B3F75A7B00BD';

        async function updateDashboard() {
            const localClock = new Date();
            document.getElementById('update-stamp').innerText = "Live System Active • Synced at " + localClock.toLocaleTimeString();

            // 1. Fetch Local Weather
            try {
                const wRes = await fetch(HKO_WEATHER_URL);
                const wData = await wRes.json();
                if(wData.temperature && wData.temperature.data.length > 0) {
                    const baseTemp = wData.temperature.data[0].value;
                    document.getElementById('current-temp').innerText = baseTemp;
                    document.getElementById('min-temp').innerText = (baseTemp - 2) + "°C"; 
                    document.getElementById('max-temp').innerText = (baseTemp + 3) + "°C";
                }
            } catch (err) { console.error(err); }

            // 2. Fetch Environmental Warnings
            try {
                const warnRes = await fetch(HKO_WARNING_URL);
                const warnData = await warnRes.json();
                const banner = document.getElementById('warning-banner');
                if (warnData && Object.keys(warnData).length > 0) {
                    let activeAlerts = [];
                    for (const key in warnData) {
                        if(warnData[key].name) activeAlerts.push(warnData[key].name);
                    }
                    if(activeAlerts.length > 0) {
                        banner.innerText = "Notice: " + activeAlerts.join(" | ");
                        banner.style.display = "block";
                    } else { banner.style.display = "none"; }
                } else { banner.style.display = "none"; }
            } catch (err) { document.getElementById('warning-banner').style.display = "none"; }

            // 3. Process Dynamic Real-Time Server-Synced Countdown
            try {
                const busRes = await fetch(KMB_ETA_URL);
                const busData = await busRes.json();
                const etaContainer = document.getElementById('bus-eta-container');
                etaContainer.innerHTML = ''; 

                const track215X = busData.data.filter(item => item.route === "215X");

                if (track215X.length === 0) {
                    etaContainer.innerHTML = '<div class="eta-row"><span style="color:var(--text-dim)">No active scheduled buses</span></div>';
                } else {
                    // CRITICAL FIX: Extract the actual timestamp generated by the KMB Server, not your local device clock
                    const serverTime = new Date(busData.generated_timestamp);

                    track215X.slice(0, 2).forEach((bus, index) => {
                        if(!bus.eta) return;
                        
                        const etaTime = new Date(bus.eta);
                        
                        // Compare bus target time strictly against the KMB server runtime clock
                        const diffMs = etaTime - serverTime;
                        const diffMins = Math.max(0, Math.floor(diffMs / 1000 / 60));
                        
                        let displayCountdown = '';
                        if (diffMins <= 1) {
                            displayCountdown = '<span style="color: var(--accent-warm);">Arriving / Leaving</span>';
                        } else {
                            displayCountdown = diffMins + '<span class="eta-mins"> min</span>';
                        }

                        const row = document.createElement('div');
                        row.className = 'eta-row';
                        row.innerHTML = `
                            <span class="eta-label">Bus ${index + 1}</span>
                            <span class="eta-time">${displayCountdown}</span>
                        `;
                        etaContainer.appendChild(row);
                    });
                }
            } catch (err) {
                console.error(err);
                document.getElementById('bus-eta-container').innerHTML = '<div class="eta-row"><span>Unavailable</span></div>';
            }
        }

        updateDashboard();
        // Fire data requests every 15 seconds to catch system database variations instantly
        setInterval(updateDashboard, 15000); 
    </script>
</body>
</html>
