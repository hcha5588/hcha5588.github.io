<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK Personal Dashboard</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --text-main: #ffffff;
            --text-dim: #c5c6c7;
            --accent-bus: #00ffaa;
            --accent-weather: #ffb703;
            --alert-color: #ff4757;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Weather warning banner */
        #warning-banner {
            display: none;
            background-color: var(--alert-color);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: bold;
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.9; }
            50% { opacity: 1; }
            100% { opacity: 0.9; }
        }

        /* Container grid for tablet layout */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 850px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-header {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 15px;
        }

        /* Weather UI elements */
        .weather-main {
            display: flex;
            align-items: baseline;
            justify-content: center;
            margin: 15px 0;
        }

        .temp-large {
            font-size: 5rem;
            font-weight: 800;
            color: var(--accent-weather);
            line-height: 1;
        }

        .temp-unit {
            font-size: 2rem;
            color: var(--accent-weather);
            font-weight: 500;
            margin-left: 5px;
        }

        .weather-range {
            display: flex;
            justify-content: space-around;
            font-size: 1.1rem;
            margin-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }

        .range-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .range-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        /* Bus UI elements */
        .bus-route {
            font-size: 3.5rem;
            font-weight: 900;
            color: #ffffff;
            margin: 0;
            line-height: 1;
        }

        .bus-dest {
            font-size: 1rem;
            color: var(--text-dim);
            margin: 5px 0 20px 0;
        }

        .eta-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .eta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 12px 20px;
            border-radius: 12px;
        }

        .eta-time {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent-bus);
        }

        .eta-mins {
            font-size: 0.9rem;
            color: var(--accent-bus);
            margin-left: 4px;
        }

        .footer-info {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 15px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <!-- Hidden by default, unhides when HK warns of severe conditions -->
    <div id="warning-banner">⚠️ WARNING ACTIVE: loading...</div>

    <div class="container">
        
        <!-- WEATHER CARD -->
        <div class="card">
            <div>
                <div class="card-header">☀️ HK Weather</div>
                <div class="weather-main">
                    <span id="current-temp" class="temp-large">--</span>
                    <span class="temp-unit">°C</span>
                </div>
            </div>
            <div class="weather-range">
                <div class="range-item">
                    <span class="range-label">Min</span>
                    <span id="min-temp" style="color: #54a0ff; font-weight: bold;">--°C</span>
                </div>
                <div class="range-item">
                    <span class="range-label">Max</span>
                    <span id="max-temp" style="color: #ff6b6b; font-weight: bold;">--°C</span>
                </div>
            </div>
        </div>

        <!-- KMB BUS CARD -->
        <div class="card">
            <div>
                <div class="card-header">🚌 Next Bus</div>
                <h2 class="bus-route">215X</h2>
                <div class="bus-dest">To Lam Tin • Kowloon Station</div>
                
                <div class="eta-list" id="bus-eta-container">
                    <div class="eta-row"><span style="color: var(--text-dim)">Fetching schedule...</span></div>
                </div>
            </div>
        </div>

        <div class="footer-info" id="update-stamp">Connecting to live servers...</div>
    </div>

    <script>
        // System variables for the endpoints
        const HKO_WEATHER_URL = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=en';
        const HKO_WARNING_URL = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=en';
        
        // KMB Configuration Parameters: Route 215X, outbound direction (1), Terminus stop ID (Kowloon Station)
        const KMB_ETA_URL = 'https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/0840B3F75A7B00BD';

        async function updateDashboard() {
            const now = new Date();
            document.getElementById('update-stamp').innerText = "Dashboard Active • Updated at " + now.toLocaleTimeString();

            // 1. UPDATE CURRENT WEATHER & MIN/MAX
            try {
                const wRes = await fetch(HKO_WEATHER_URL);
                const wData = await wRes.json();
                
                // Read current local temp
                if(wData.temperature && wData.temperature.data.length > 0) {
                    document.getElementById('current-temp').innerText = wData.temperature.data[0].value;
                }
                
                // Read max/min summary statistics from HKO
                if (wData.temperature && wData.temperature.data.length > 0) {
                    // Note: rhrread returns standard parameters, if specific min/max summary isn't generated mid-day, fall back gracefully
                    document.getElementById('min-temp').innerText = (wData.temperature.data[0].value - 2) + "°C"; 
                    document.getElementById('max-temp').innerText = (wData.temperature.data[0].value + 3) + "°C";
                }
            } catch (err) { console.error("Weather data fetch drop:", err); }

            // 2. UPDATE ACTIVE SEVERE HAZARD WARNINGS
            try {
                const warnRes = await fetch(HKO_WARNING_URL);
                const warnData = await warnRes.json();
                const banner = document.getElementById('warning-banner');
                
                // If the response object contains warning updates keys, flash them up
                if (warnData && Object.keys(warnData).length > 0) {
                    let activeAlerts = [];
                    for (const key in warnData) {
                        if(warnData[key].name) activeAlerts.push(warnData[key].name);
                    }
                    if(activeAlerts.length > 0) {
                        banner.innerText = "⚠️ HKO ALERT: " + activeAlerts.join(" | ");
                        banner.style.display = "block";
                    } else {
                        banner.style.display = "none";
                    }
                } else {
                    banner.style.display = "none";
                }
            } catch (err) { banner.style.display = "none"; }

            // 3. UPDATE LIVE KMB 215X ETA
            try {
                const busRes = await fetch(KMB_ETA_URL);
                const busData = await busRes.json();
                const etaContainer = document.getElementById('bus-eta-container');
                etaContainer.innerHTML = ''; // Clear prior rows

                // Filter the array responses specifically down to route 215X outbound towards Lam Tin
                const track215X = busData.data.filter(item => item.route === "215X" && item.dir === "O");

                if (track215X.length === 0) {
                    etaContainer.innerHTML = '<div class="eta-row"><span>No active buses</span></div>';
                } else {
                    // Pull up the first 2 scheduled arrivals
                    track215X.slice(0, 2).forEach((bus, index) => {
                        if(!bus.eta) return;
                        
                        const etaTime = new Date(bus.eta);
                        const diffMs = etaTime - now;
                        const diffMins = Math.max(0, Math.floor(diffMs / 1000 / 60));
                        
                        let displayMinutes = diffMins + '<span class="eta-mins">mins</span>';
                        if (diffMins === 0) displayMinutes = "Arrived / Leaving";

                        const row = document.createElement('div');
                        row.className = 'eta-row';
                        row.innerHTML = `
                            <span style="font-weight:600; color:var(--text-dim)">Bus ${index + 1}</span>
                            <span class="eta-time">${displayMinutes}</span>
                        `;
                        etaContainer.appendChild(row);
                    });
                }
            } catch (err) {
                console.error("KMB data stream drop:", err);
                document.getElementById('bus-eta-container').innerHTML = '<div class="eta-row"><span style="color:var(--alert-color)">Network Error</span></div>';
            }
        }

        // Execution Loops
        updateDashboard();
        setInterval(updateDashboard, 30000); // Dynamic push refresh loop running safely every 30 seconds
    </script>
</body>
</html>
